<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Business Health Audit — Peninsula Advisory Collective</title>
  <meta name="description" content="Free business health self-assessment covering finance, legal, HR, marketing and more. From the Peninsula Advisory Collective, Devon & Cornwall."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0B3D5E;
      --ocean:   #185A80;
      --gold:    #C8A96E;
      --gold-lt: #E8C97E;
      --mist:    #E8F0F5;
      --cream:   #F5F2EC;
      --cream-dk:#EDE9E0;
      --charcoal:#2C2C2A;
      --mid:     #6B6B68;
      --border:  #DDD8CE;
      --white:   #FFFFFF;
      --red-bg:  #FEF3F2;
      --red-bdr: #F5B8B2;
      --red-txt: #9B2D24;
      --amb-bg:  #FEF7EC;
      --amb-bdr: #F0D08A;
      --amb-txt: #8B6914;
      --blu-bg:  #EAF0F5;
      --blu-bdr: #8BAFC5;
      --blu-txt: #0B3D5E;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #F0EDE6;
      color: var(--charcoal);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout ── */
    .shell {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Card chrome ── */
    .chrome {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 24px rgba(11,61,94,0.13), 0 1px 4px rgba(0,0,0,0.06);
    }

    .chrome-head {
      background: var(--navy);
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .chrome-band {
      background: var(--ocean);
      padding: 0.55rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .band-text {
      font-size: 10px;
      color: #8BAFC5;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .chrome-body {
      background: var(--cream);
      padding: 1.75rem;
      border: 0.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
    }

    /* ── Progress ── */
    .prog-wrap { text-align: right; }
    .prog-bar-bg { background: rgba(255,255,255,0.18); border-radius: 99px; height: 4px; width: 160px; margin-bottom: 4px; margin-left: auto; }
    .prog-bar-fill { background: var(--gold); height: 4px; border-radius: 99px; transition: width 0.4s ease; }
    .prog-label { font-size: 10px; color: #8BAFC5; letter-spacing: 0.5px; }

    /* ── Typography ── */
    .serif { font-family: 'EB Garamond', Georgia, serif; }
    h1.page-title { font-family: 'EB Garamond', Georgia, serif; font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1.2; margin-bottom: 0.35rem; }
    h2.sec-title  { font-family: 'EB Garamond', Georgia, serif; font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 0.25rem; }
    .tagline { font-family: 'EB Garamond', Georgia, serif; font-size: 18px; font-style: italic; color: var(--navy); margin-bottom: 1rem; line-height: 1.5; }
    .lede { font-size: 13.5px; color: var(--mid); line-height: 1.75; margin-bottom: 1.25rem; }
    .eyebrow { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--mid); margin-bottom: 0.6rem; }

    /* ── Divider ── */
    hr { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

    /* ── Section badge ── */
    .sec-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--mist); border: 0.5px solid var(--blu-bdr);
      border-radius: 99px; padding: 4px 14px;
      font-size: 11px; color: var(--navy); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 0.75rem;
    }

    /* ── Area chips ── */
    .area-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 8px; margin-bottom: 1.5rem; }
    .area-chip {
      background: var(--white); border: 0.5px solid var(--border);
      border-radius: 7px; padding: 8px 10px;
      font-size: 12px; color: var(--navy);
      display: flex; align-items: center; gap: 7px;
    }
    .area-chip svg { flex-shrink: 0; }

    /* ── Form ── */
    .biz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .biz-group { display: flex; flex-direction: column; gap: 5px; }
    .biz-group.full { grid-column: 1 / -1; }
    .biz-group label { font-size: 11px; color: var(--mid); letter-spacing: 0.5px; text-transform: uppercase; }
    .biz-group input,
    .biz-group select {
      border: 0.5px solid #ccc; border-radius: 7px;
      padding: 9px 11px; font-size: 13px;
      background: var(--white); color: var(--charcoal);
      font-family: 'Inter', Arial, sans-serif;
      outline: none; transition: border-color 0.15s;
    }
    .biz-group input:focus, .biz-group select:focus { border-color: var(--navy); }

    /* ── Question cards ── */
    .q-card {
      background: var(--white); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.6rem;
      transition: box-shadow 0.15s;
    }
    .q-card.answered { border-color: var(--blu-bdr); }
    .q-text { font-size: 13.5px; color: var(--charcoal); margin-bottom: 0.85rem; line-height: 1.55; }
    .rating-row { display: flex; gap: 6px; align-items: center; }
    .r-lbl { font-size: 11px; color: #aaa; min-width: 58px; }
    .r-lbl.right { text-align: right; }
    .r-btns { display: flex; gap: 5px; flex: 1; justify-content: center; }
    .r-btn {
      width: 38px; height: 36px; border-radius: 7px;
      border: 0.5px solid #ccc; background: var(--white);
      color: #999; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: 'Inter', Arial, sans-serif;
      transition: all 0.12s;
    }
    .r-btn:hover { border-color: var(--navy); color: var(--navy); background: var(--mist); }
    .r-btn.s1, .r-btn.s2 { background: var(--red-bg);  border-color: var(--red-bdr);  color: var(--red-txt); }
    .r-btn.s3             { background: var(--amb-bg);  border-color: var(--amb-bdr);  color: var(--amb-txt); }
    .r-btn.s4, .r-btn.s5 { background: var(--blu-bg);  border-color: var(--blu-bdr);  color: var(--blu-txt); }

    /* ── Buttons ── */
    .btn-back {
      padding: 9px 18px; border-radius: 7px;
      border: 0.5px solid #ccc; background: var(--white);
      color: var(--charcoal); font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'Inter', Arial, sans-serif; transition: background 0.12s;
    }
    .btn-back:hover { background: var(--mist); }
    .btn-back:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-navy {
      padding: 9px 22px; border-radius: 7px; border: none;
      background: var(--navy); color: var(--white);
      font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Inter', Arial, sans-serif; transition: background 0.12s;
    }
    .btn-navy:hover { background: var(--ocean); }
    .btn-gold {
      padding: 10px 24px; border-radius: 7px; border: none;
      background: var(--gold); color: var(--navy);
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Inter', Arial, sans-serif; transition: background 0.12s;
    }
    .btn-gold:hover { background: var(--gold-lt); }
    .btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 14px; }

    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }

    /* ── Skip note ── */
    .skip-note { font-size: 11px; color: #bbb; text-align: center; }

    /* ── Step dots ── */
    .step-dots { display: flex; gap: 5px; justify-content: center; }
    .step-dot { width: 7px; height: 7px; border-radius: 99px; background: #ccc; transition: all 0.2s; }
    .step-dot.done { background: var(--gold); }
    .step-dot.active { background: var(--navy); width: 18px; }

    /* ── Results ── */
    .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .rc {
      background: var(--white); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 0.9rem 1rem;
    }
    .rc.priority { border-color: var(--red-bdr); }
    .rc.strong   { border-color: var(--blu-bdr); }
    .rc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .rc-name { font-size: 12px; font-weight: 600; color: var(--charcoal); display: flex; align-items: center; gap: 5px; }
    .rc-score { font-family: 'EB Garamond', Georgia, serif; font-size: 22px; font-weight: 700; }
    .score-low { color: #C0392B; }
    .score-mid { color: #B07D1A; }
    .score-hi  { color: var(--navy); }
    .rc-bar-bg { background: #e8e4dc; border-radius: 99px; height: 4px; margin-bottom: 7px; }
    .rc-bar    { height: 4px; border-radius: 99px; }
    .rc-tag { font-size: 10px; padding: 2px 9px; border-radius: 99px; display: inline-block; letter-spacing: 0.5px; }
    .tag-p { background: var(--red-bg); color: var(--red-txt); }
    .tag-r { background: var(--amb-bg); color: var(--amb-txt); }
    .tag-s { background: var(--blu-bg); color: var(--blu-txt); }

    /* ── Rec items ── */
    .rec-block {
      background: var(--white); border-radius: 8px;
      border: 0.5px solid var(--border);
      padding: 0.9rem 1rem; margin-bottom: 0.6rem;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .rec-ico { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .rec-txt { font-size: 13px; color: var(--charcoal); line-height: 1.6; }

    /* ── CTA box ── */
    .cta-box {
      background: var(--navy); border-radius: 10px;
      padding: 1.5rem 1.75rem; margin-top: 1.25rem;
    }
    .cta-title { font-family: 'EB Garamond', Georgia, serif; font-size: 20px; color: var(--white); margin-bottom: 0.4rem; }
    .cta-body  { font-size: 13px; color: #8BAFC5; line-height: 1.7; margin-bottom: 1.1rem; }

    /* ── Score summary bar ── */
    .overall-bar {
      background: var(--white); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 1.25rem;
    }
    .overall-num { font-family: 'EB Garamond', Georgia, serif; font-size: 40px; font-weight: 700; color: var(--navy); line-height: 1; min-width: 60px; }
    .overall-label { font-size: 12px; color: var(--mid); line-height: 1.6; }
    .overall-right { flex: 1; }
    .overall-bg { background: #e8e4dc; border-radius: 99px; height: 8px; margin-bottom: 6px; }
    .overall-fill { height: 8px; border-radius: 99px; background: var(--navy); transition: width 0.6s ease; }

    /* ── Footer ── */
    .tool-footer {
      text-align: center; padding: 1.25rem 0 0.5rem;
      font-size: 11px; color: #aaa; letter-spacing: 0.5px;
    }
    .tool-footer a { color: var(--gold); text-decoration: none; }

    /* ── Print ── */
    @media print {
      body { background: white; padding: 0; }
      .shell { max-width: 100%; }
      .chrome { box-shadow: none; }
      .btn-back, .btn-navy, .btn-gold, .nav-row { display: none; }
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      body { padding: 0.75rem 0.5rem; }
      .chrome-body { padding: 1.25rem 1.1rem; }
      .biz-grid { grid-template-columns: 1fr; }
      .biz-group.full { grid-column: 1; }
      .results-grid { grid-template-columns: 1fr 1fr; }
      .r-btn { width: 34px; height: 34px; font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="chrome" id="app"></div>
  <div class="tool-footer">
    &copy; 2025 Peninsula Advisory Collective &nbsp;&middot;&nbsp; Devon &amp; Cornwall &nbsp;&middot;&nbsp;
    <a href="mailto:hello@peninsulaadvisorycollective.co.uk">hello@peninsulaadvisorycollective.co.uk</a>
  </div>
</div>

<script>
/* ── Icon SVGs (inline, no external dependency) ── */
const ICONS = {
  coin:     '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v2m0 8v2M9.5 9.5C9.5 8.1 10.6 7 12 7s2.5 1.1 2.5 2.5c0 2-2.5 2.5-2.5 4m0 2h.01"/></svg>',
  calc:     '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>',
  scale:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 6l9-3 9 3M6 10l-3 7h6l-3-7zm12 0l-3 7h6l-3-7z"/></svg>',
  shield:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.5C17.5 22.15 21 17.25 21 12V6l-8-4z"/></svg>',
  laptop:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M2 20h20"/></svg>',
  users:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75M21 21v-2a4 4 0 0 0-3-3.85"/></svg>',
  school:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',
  megaphone:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>',
  arrow_r:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
  arrow_l:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>',
  refresh:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
  check:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  alert:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  star:     '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  map:      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
};

const icon = (k, style='') => `<span style="display:inline-flex;align-items:center;${style}">${ICONS[k]||''}</span>`;

/* ── Data ── */
const SECTIONS = [
  { id:'finance',   label:'Finance & Banking',     ico:'coin',      desc:'How well are you managing your financial foundations, cash flow, and funding?',
    questions:['We have a clear view of our cash flow at least 3 months ahead','We regularly review our management accounts and act on them','We have appropriate banking facilities and financing in place for our current stage','We understand our break-even point and key financial metrics','We have a financial plan aligned to our business goals'] },
  { id:'accounting',label:'Accounting',             ico:'calc',      desc:'How robust are your bookkeeping, tax, and financial reporting processes?',
    questions:['Our bookkeeping is current and accurate','We are fully up to date with HMRC obligations and deadlines','We use accounting software effectively to run the business','We review profitability by product, service, or customer','We have good processes for invoicing and chasing payments'] },
  { id:'legal',     label:'Legal',                  ico:'scale',     desc:'Are your contracts, compliance, and legal foundations solid?',
    questions:['We have written contracts in place with customers and suppliers','Our business structure is right for our current situation','We are aware of and complying with regulations for our sector','We have appropriate IP protection in place','Our employment contracts and HR documentation are legally compliant'] },
  { id:'insurance', label:'Insurance',              ico:'shield',    desc:'Are your business risks adequately covered?',
    questions:['We have reviewed our insurance cover in the last 12 months','We hold appropriate professional indemnity or liability cover','We understand what risks could significantly harm the business if uninsured','Our key-person or business interruption risks are considered','We have employer\'s liability insurance if we have any staff'] },
  { id:'it',        label:'IT & Technology',        ico:'laptop',    desc:'How well does your technology support and protect your business?',
    questions:['Our IT systems and tools are fit for purpose and up to date','We have adequate cybersecurity measures and data backups in place','We are compliant with GDPR and data protection requirements','Our technology roadmap supports planned business growth','Staff are trained and confident using our core systems'] },
  { id:'hr',        label:'HR & People',            ico:'users',     desc:'How well are you managing your people, culture, and workforce planning?',
    questions:['We have clear roles, responsibilities, and org structure','We have an effective recruitment and onboarding process','Staff retention and morale is healthy','We have performance management and development processes in place','We understand our obligations as an employer'] },
  { id:'ld',        label:'Learning & Development', ico:'school',    desc:'Are you investing in skills and development to future-proof your business?',
    questions:['We have identified the skills gaps in our business','Staff have access to training relevant to their role','Leadership and management capability is being developed','We have a clear plan for developing key individuals','We use apprenticeships, grants, or funded training where available'] },
  { id:'marketing', label:'Marketing',              ico:'megaphone', desc:'How effectively are you attracting, converting, and retaining customers?',
    questions:['We have a clear understanding of our target customers and their needs','Our brand, messaging, and value proposition are clear and consistent','We have an effective and up-to-date digital presence','We have a repeatable process for generating new leads','We measure and understand our marketing return on investment'] },
];

const TIPS = {
  finance:   'A financial health check could uncover quick wins in cash management and identify funding options suited to your stage of growth.',
  accounting:'Tightening your accounting processes and understanding your numbers better could directly improve profitability and reduce tax risk.',
  legal:     'Reviewing your contracts and structure now can prevent costly disputes and give you the confidence to grow.',
  insurance: 'An insurance review will ensure you are protected against the risks that matter most — without paying for cover you don\'t need.',
  it:        'A technology audit could reduce your exposure to cyber risk, improve day-to-day efficiency, and lay the foundations for scaling.',
  hr:        'Addressing people management gaps will help you attract, retain, and get the very best from your team.',
  ld:        'A structured development plan for your team builds the skills your business needs to grow and reduces dependency on key individuals.',
  marketing: 'Sharper marketing strategy and consistent execution will help you find, win, and keep more of the right customers.',
};

/* ── State ── */
let S = { screen:'intro', bizName:'', sector:'', employees:'', turnover:'', section:0, answers:{} };

/* ── Helpers ── */
function secScore(sid) {
  const a = Object.values(S.answers[sid]||{});
  return a.length ? +(a.reduce((x,y)=>x+y,0)/a.length).toFixed(2) : null;
}
function overallScore() {
  const scored = SECTIONS.map(s=>secScore(s.id)).filter(v=>v!==null);
  return scored.length ? +(scored.reduce((a,b)=>a+b,0)/scored.length).toFixed(2) : null;
}
function progress() {
  let t=0, a=0;
  SECTIONS.forEach(s=>{ t+=s.questions.length; a+=Object.keys(S.answers[s.id]||{}).length; });
  return { t, a, pct: Math.round(a/t*100) };
}
function scoreClass(v) { return v<2.5?'score-low':v<3.5?'score-mid':'score-hi'; }
function barColor(v)   { return v<2.5?'#C0392B':v<3.5?'#E8A020':'#185A80'; }
function tagHtml(v)    {
  if(v<2.5) return '<span class="rc-tag tag-p">Priority area</span>';
  if(v<3.5) return '<span class="rc-tag tag-r">Worth reviewing</span>';
  return '<span class="rc-tag tag-s">Strength</span>';
}
function overallLabel(v) {
  if(v<2)   return 'Several areas need attention — targeted support could make a significant difference.';
  if(v<3)   return 'Some solid foundations, but there are meaningful gaps worth addressing.';
  if(v<3.8) return 'Good overall health with a few areas to sharpen up.';
  return 'Strong across the board — fine-tuning a few areas could unlock the next level of growth.';
}

/* ── Logo SVG ── */
function logoSvg(w=200, goldText='#C8A96E', whiteText='#ffffff', subText='#8BAFC5') {
  return `<svg width="${w}" height="${Math.round(w*0.37)}" viewBox="0 0 200 74" aria-hidden="true">
    <polygon points="28,6 52,48 4,48" fill="none" stroke="${goldText}" stroke-width="1.8"/>
    <polygon points="28,18 46,48 10,48" fill="none" stroke="${goldText}" stroke-width="0.9" opacity="0.4"/>
    <line x1="4" y1="48" x2="52" y2="48" stroke="${goldText}" stroke-width="1.8"/>
    <text x="64" y="25" font-size="18" font-weight="700" fill="${whiteText}" font-family="EB Garamond,Georgia,serif" letter-spacing="0.5">Peninsula</text>
    <text x="64" y="42" font-size="18" font-weight="400" fill="${goldText}" font-family="EB Garamond,Georgia,serif" letter-spacing="0.5">Advisory</text>
    <text x="64" y="53" font-size="8" fill="${subText}" font-family="Inter,Arial,sans-serif" letter-spacing="3.5">COLLECTIVE</text>
    <line x1="64" y1="46" x2="196" y2="46" stroke="${goldText}" stroke-width="0.5" opacity="0.3"/>
  </svg>`;
}

/* ── Step dots ── */
function stepDots() {
  return `<div class="step-dots">${SECTIONS.map((s,i)=>{
    const cls = i<S.section?'done':i===S.section?'active':'';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('')}</div>`;
}

/* ── Header ── */
function header(showProgress) {
  const p = progress();
  return `
  <div class="chrome-head">
    ${logoSvg()}
    <div class="prog-wrap">
      ${showProgress ? `
        <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${p.pct}%"></div></div>
        <div class="prog-label">${p.a} of ${p.t} answered</div>` :
        `<div style="font-size:10px;color:#8BAFC5;letter-spacing:1.5px;text-align:right;">DEVON &amp; CORNWALL</div>`
      }
    </div>
  </div>
  <div class="chrome-band">
    <span class="band-text">Business Health Audit</span>
    ${showProgress ? stepDots() : '<span class="band-text">Free self-assessment</span>'}
  </div>`;
}

/* ── Screens ── */
function renderIntro() {
  return header(false) + `<div class="chrome-body">
    <p class="tagline">"Your boardroom, without the overhead."</p>
    <p class="lede">This free self-assessment covers 8 key areas of business health and takes around 10 minutes to complete. At the end you'll receive a personalised score report highlighting where expert support from our collective could help your business move forwards.</p>
    <div class="area-grid">
      ${SECTIONS.map(s=>`<div class="area-chip">${icon(s.ico,'color:var(--navy);')}${s.label}</div>`).join('')}
    </div>
    <hr/>
    <p class="eyebrow" style="margin-bottom:12px;">Tell us about your business</p>
    <div class="biz-grid">
      <div class="biz-group full">
        <label>Business name <span style="font-style:italic;text-transform:none;">(optional)</span></label>
        <input type="text" id="bn" placeholder="e.g. Kernow Bakery Ltd" value="${S.bizName}"/>
      </div>
      <div class="biz-group">
        <label>Sector</label>
        <select id="bs">
          <option value="">Select your sector…</option>
          ${['Retail','Hospitality & Tourism','Construction & Trades','Professional Services','Agriculture & Food','Manufacturing','Health & Wellbeing','Technology','Creative & Media','Education & Training','Other'].map(s=>`<option${S.sector===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="biz-group">
        <label>Number of employees</label>
        <select id="be">
          <option value="">Select…</option>
          ${['Just me (sole trader)','2–5','6–20','21–50','51–100','100+'].map(e=>`<option${S.employees===e?' selected':''}>${e}</option>`).join('')}
        </select>
      </div>
      <div class="biz-group">
        <label>Annual turnover (approx.)</label>
        <select id="bt">
          <option value="">Select…</option>
          ${['Under £50k','£50k–£200k','£200k–£500k','£500k–£1m','£1m–£5m','Over £5m'].map(t=>`<option${S.turnover===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="biz-group">
        <label>Business location</label>
        <select id="bl">
          <option value="">Select county…</option>
          ${['Cornwall','Devon','Plymouth','Torbay','Somerset','Other South West'].map(l=>`<option${S.location===l?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>
    <button class="btn-gold btn-full" onclick="startAudit()">
      Start the audit ${icon('arrow_r','margin-left:4px;')}
    </button>
    <p style="font-size:11px;color:#bbb;text-align:center;margin-top:10px;">Your answers are not stored or shared. This tool is for guidance only.</p>
  </div>`;
}

function renderSection() {
  const sec = SECTIONS[S.section];
  const ans = S.answers[sec.id]||{};
  const allDone = sec.questions.every((_,i)=>ans[i]!==undefined);
  const isLast = S.section === SECTIONS.length-1;

  return header(true) + `<div class="chrome-body">
    <div class="sec-badge">${icon(sec.ico,'color:var(--navy);margin-right:2px;')}${sec.label}</div>
    <h2 class="sec-title">${sec.label}</h2>
    <p class="lede" style="margin-bottom:1rem;">${sec.desc}</p>
    ${sec.questions.map((q,qi)=>`
    <div class="q-card${ans[qi]!==undefined?' answered':''}">
      <p class="q-text">${q}</p>
      <div class="rating-row">
        <span class="r-lbl">Not in place</span>
        <div class="r-btns">
          ${[1,2,3,4,5].map(v=>`<button class="r-btn${ans[qi]===v?' s'+v:''}"
            onclick="saveAns('${sec.id}',${qi},${v})"
            title="${['1 — Not in place at all','2 — Barely started','3 — Partially in place','4 — Mostly in place','5 — Fully in place'][v-1]}">${v}</button>`).join('')}
        </div>
        <span class="r-lbl right">Fully in place</span>
      </div>
    </div>`).join('')}
    <div class="nav-row">
      <button class="btn-back" onclick="nav(-1)" ${S.section===0?'disabled':''}>
        ${icon('arrow_l','margin-right:4px;')} Back
      </button>
      <span class="skip-note">${!allDone?'You can skip questions and return later':''}</span>
      ${isLast
        ? `<button class="btn-gold" onclick="showResults()">${icon('check','margin-right:4px;')} See my results</button>`
        : `<button class="btn-navy" onclick="nav(1)">Next section ${icon('arrow_r','margin-left:4px;')}</button>`}
    </div>
  </div>`;
}

function renderResults() {
  const scored = SECTIONS.map(s=>({...s, score:secScore(s.id)})).filter(s=>s.score!==null);
  const overall = overallScore();
  const overallPct = overall ? Math.round((overall-1)/4*100) : 0;
  const priorities = scored.filter(s=>s.score<2.5).sort((a,b)=>a.score-b.score);
  const reviews    = scored.filter(s=>s.score>=2.5&&s.score<3.5);
  const strengths  = scored.filter(s=>s.score>=3.5);
  const bizRef = S.bizName ? `<strong>${S.bizName}</strong>` : 'your business';

  return header(false) + `<div class="chrome-body">
    <h1 class="page-title" style="margin-bottom:0.2rem;">Your audit results</h1>
    <p class="lede">Here is how ${bizRef} scores across the 8 areas of business health.</p>

    ${overall!==null?`
    <div class="overall-bar">
      <div class="overall-num">${overall.toFixed(1)}</div>
      <div class="overall-right">
        <div class="overall-bg"><div class="overall-fill" style="width:${overallPct}%;"></div></div>
        <div class="overall-label">${overallLabel(overall)}</div>
      </div>
    </div>`:''}

    <div class="results-grid">
      ${scored.map(s=>{
        const pct = Math.round((s.score-1)/4*100);
        const cls = s.score<2.5?'priority':s.score>=3.5?'strong':'';
        return `<div class="rc ${cls}">
          <div class="rc-top">
            <div class="rc-name">${icon(s.ico,'color:var(--navy);margin-right:3px;')}${s.label}</div>
            <span class="rc-score ${scoreClass(s.score)}">${s.score.toFixed(1)}</span>
          </div>
          <div class="rc-bar-bg"><div class="rc-bar" style="width:${pct}%;background:${barColor(s.score)};"></div></div>
          ${tagHtml(s.score)}
        </div>`;
      }).join('')}
    </div>

    ${priorities.length?`
    <p class="eyebrow" style="color:var(--red-txt);margin-bottom:8px;">${icon('alert','color:var(--red-txt);margin-right:5px;')}Priority areas for support</p>
    ${priorities.map(s=>`<div class="rec-block">
      <span class="rec-ico" style="color:var(--red-txt);">${icon(s.ico)}</span>
      <p class="rec-txt"><strong>${s.label}:</strong> ${TIPS[s.id]}</p>
    </div>`).join('')}`:''}

    ${reviews.length?`
    <p class="eyebrow" style="color:var(--amb-txt);margin:12px 0 8px;">${icon('alert','color:var(--amb-txt);margin-right:5px;')}Areas worth reviewing</p>
    ${reviews.map(s=>`<div class="rec-block">
      <span class="rec-ico" style="color:var(--amb-txt);">${icon(s.ico)}</span>
      <p class="rec-txt"><strong>${s.label}:</strong> ${TIPS[s.id]}</p>
    </div>`).join('')}`:''}

    ${strengths.length?`
    <p class="eyebrow" style="color:var(--blu-txt);margin:12px 0 8px;">${icon('star','color:var(--blu-txt);margin-right:5px;')}Your strengths</p>
    <div class="rec-block">
      <span class="rec-ico" style="color:var(--navy);">${icon('check')}</span>
      <p class="rec-txt">You scored well in <strong>${strengths.map(s=>s.label).join(', ')}</strong> — these are solid foundations to build the rest of your business on.</p>
    </div>`:''}

    <div class="cta-box">
      <p class="cta-title">Ready to meet the collective?</p>
      <p class="cta-body">Peninsula Advisory Collective brings together finance, banking, accounting, legal, insurance, IT, HR, L&amp;D, and marketing experts from across Devon and Cornwall. Our quarterly roundtable gives growing businesses direct access to fractional boardroom-level expertise — no long-term contracts, no retainers.</p>
      <p class="cta-body" style="margin-bottom:1.1rem;">To find out how we can help, get in touch and we will arrange a no-obligation conversation with the relevant members of our collective.</p>
      <a href="mailto:hello@peninsulaadvisorycollective.co.uk" class="btn-gold" style="text-decoration:none;">
        ${icon('arrow_r','margin-right:5px;')} Get in touch with the collective
      </a>
    </div>

    <div style="margin-top:1.1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <button class="btn-back" onclick="restart()">${icon('refresh','margin-right:4px;')} Start over</button>
      <button class="btn-back" onclick="window.print()">${icon('arrow_r','margin-right:4px;')} Print / save as PDF</button>
    </div>
  </div>`;
}

/* ── Actions ── */
function saveAns(sid, qi, v) {
  if(!S.answers[sid]) S.answers[sid]={};
  S.answers[sid][qi]=v;
  render();
}
function startAudit() {
  S.bizName    = document.getElementById('bn')?.value||'';
  S.sector     = document.getElementById('bs')?.value||'';
  S.employees  = document.getElementById('be')?.value||'';
  S.turnover   = document.getElementById('bt')?.value||'';
  S.location   = document.getElementById('bl')?.value||'';
  S.screen = 'section';
  render();
}
function nav(d) {
  S.section = Math.max(0, Math.min(SECTIONS.length-1, S.section+d));
  render();
}
function showResults() { S.screen='results'; render(); }
function restart() {
  S = { screen:'intro', bizName:'', sector:'', employees:'', turnover:'', location:'', section:0, answers:{} };
  render();
}

function render() {
  const app = document.getElementById('app');
  if(S.screen==='intro')   app.innerHTML = renderIntro();
  if(S.screen==='section') app.innerHTML = renderSection();
  if(S.screen==='results') app.innerHTML = renderResults();
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
</script>
</body>
</html>
